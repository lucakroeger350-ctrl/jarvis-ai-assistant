<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8" />
<style>
  html, body {
    margin: 0; padding: 0; width: 100%; height: 100%; background: #060606;
    font-family: 'Consolas', 'Share Tech Mono', monospace; color: #f4f0ec;
    display: flex; flex-direction: column; box-sizing: border-box; padding: 20px;
  }
  .header { color: #ff5722; font-size: 13px; letter-spacing: 3px; margin-bottom: 14px; border-bottom: 1px solid rgba(255,87,34,0.35); padding-bottom: 10px; }
  .message { flex: 1; overflow-y: auto; font-size: 13px; line-height: 1.6; white-space: pre-wrap; word-break: break-word; }
  .actions { display: flex; gap: 10px; margin-top: 16px; }
  button {
    background: transparent; border: 1px solid rgba(255,87,34,0.5); color: #ff5722;
    font-family: inherit; font-size: 12px; padding: 8px 16px; cursor: pointer; letter-spacing: 1px;
  }
  button:hover { background: rgba(255,87,34,0.15); }
</style>
</head>
<body>
  <div class="header">JARVIS // SYSTEM-FEHLERMELDUNG</div>
  <div class="message" id="messageEl"></div>
  <div class="actions">
    <button id="speakBtn">Vorlesen</button>
    <button id="closeBtn">Schließen</button>
  </div>
  <script>
    const params = new URLSearchParams(window.location.search);
    const message = params.get('message') || 'Unbekannter Fehler.';
    document.getElementById('messageEl').textContent = message;

    document.getElementById('speakBtn').addEventListener('click', () => {
      const utter = new SpeechSynthesisUtterance('Sir, es ist ein Systemfehler aufgetreten: ' + message);
      utter.lang = 'de-DE';
      speechSynthesis.speak(utter);
    });
    document.getElementById('closeBtn').addEventListener('click', () => window.close());
  </script>
</body>
</html>
