<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8" />
<style>
  :root { --amber: #ff5722; --amber-glow: rgba(255,87,34,0.5); }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden;
    background: #000; color: #f4f0ec; font-family: 'Consolas', 'Share Tech Mono', monospace;
    user-select: none;
  }
  /* Feines Taktik-Grid im Hintergrund */
  .grid {
    position: absolute; inset: 0; opacity: 0.35;
    background-image:
      linear-gradient(rgba(255,87,34,0.08) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,87,34,0.08) 1px, transparent 1px);
    background-size: 46px 46px;
  }
  .vignette { position: absolute; inset: 0; background: radial-gradient(circle at 50% 45%, transparent 40%, rgba(0,0,0,0.85) 100%); }

  .stage { position: relative; width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; flex-direction: column; }
  .hidden { display: none !important; }

  /* ---- Kugel ---- */
  .orb-wrap { display: flex; flex-direction: column; align-items: center; animation: fadein 1.2s ease both; }
  .orb {
    width: 220px; height: 220px; border-radius: 50%;
    background: radial-gradient(circle at 40% 35%, rgba(255,190,140,0.98), var(--amber) 46%, rgba(0,0,0,0) 73%);
    box-shadow: 0 0 70px 22px var(--amber-glow), 0 0 160px 70px rgba(255,87,34,0.14);
    animation: pulse 2.4s ease-in-out infinite;
  }
  .orb.red {
    background: radial-gradient(circle at 40% 35%, rgba(255,120,120,0.95), #ff2a1f 46%, rgba(0,0,0,0) 73%);
    box-shadow: 0 0 70px 22px rgba(255,42,31,0.55), 0 0 170px 80px rgba(255,42,31,0.18);
    animation: flicker 1.1s ease-in-out infinite;
  }
  @keyframes pulse { 0%,100% { transform: scale(0.95); opacity: 0.9; } 50% { transform: scale(1.05); opacity: 1; } }
  @keyframes flicker { 0%,100% { opacity: 0.7; transform: scale(0.96); } 45% { opacity: 1; transform: scale(1.04); } 60% { opacity: 0.5; } }
  @keyframes fadein { from { opacity: 0; transform: translateY(14px); } to { opacity: 1; transform: none; } }

  .speech { margin-top: 34px; max-width: 720px; text-align: center; font-size: 20px; letter-spacing: 1px; line-height: 1.6; text-shadow: 0 0 16px rgba(255,87,34,0.35); min-height: 32px; }
  .caret::after { content: '▊'; margin-left: 2px; animation: blink 1s steps(1) infinite; color: var(--amber); }
  @keyframes blink { 50% { opacity: 0; } }

  /* ---- Eingabeleiste ---- */
  .inputbar { margin-top: 30px; display: flex; align-items: center; gap: 12px; opacity: 0; animation: fadein 0.6s ease 0.4s forwards; }
  .inputbar .prompt { color: var(--amber); font-size: 20px; }
  .inputbar input {
    background: rgba(255,87,34,0.06); border: 1px solid rgba(255,87,34,0.5); color: #f4f0ec;
    font-family: inherit; font-size: 17px; padding: 12px 18px; width: 360px; outline: none; letter-spacing: 1px;
    box-shadow: 0 0 18px rgba(255,87,34,0.12) inset;
  }
  .inputbar .hint { font-size: 12px; color: rgba(255,255,255,0.4); margin-left: 6px; }

  /* ---- HUD-Monitor (Sekundärrolle) ---- */
  .hud-panel { position: relative; width: 78%; max-width: 900px; }
  .hud-title { color: var(--amber); letter-spacing: 6px; font-size: 15px; margin-bottom: 22px; text-align: center; text-shadow: 0 0 14px rgba(255,87,34,0.4); }
  .hud-rings { position: relative; width: 300px; height: 300px; margin: 0 auto; }
  .ring { position: absolute; inset: 0; border-radius: 50%; border: 2px solid rgba(255,87,34,0.35); }
  .ring.r1 { animation: spin 9s linear infinite; border-top-color: var(--amber); }
  .ring.r2 { inset: 26px; animation: spin 6s linear infinite reverse; border-left-color: var(--amber); }
  .ring.r3 { inset: 54px; animation: spin 12s linear infinite; border-bottom-color: var(--amber); }
  .ring-core { position: absolute; inset: 96px; border-radius: 50%; background: radial-gradient(circle at 40% 35%, rgba(255,170,110,0.9), var(--amber) 60%, rgba(0,0,0,0) 78%); box-shadow: 0 0 40px 8px var(--amber-glow); display: flex; align-items: center; justify-content: center; font-size: 26px; font-weight: 700; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .hud-lines { margin-top: 30px; font-size: 13px; line-height: 2; color: rgba(255,255,255,0.7); text-align: center; }
  .hud-lines b { color: var(--amber); }

  /* Rot-Alarm-Färbung des ganzen Screens */
  body.red-alert { animation: redpulse 1.1s ease-in-out infinite; }
  body.red-alert .grid { background-image: linear-gradient(rgba(255,40,40,0.14) 1px, transparent 1px), linear-gradient(90deg, rgba(255,40,40,0.14) 1px, transparent 1px); opacity: 0.6; }
  @keyframes redpulse { 0%,100% { background: #100000; } 50% { background: #2a0000; } }
</style>
</head>
<body>
  <div class="grid"></div>
  <div class="vignette"></div>

  <div class="stage">
    <!-- Kugel-Seite (Primärmonitor) -->
    <div class="orb-wrap hidden" id="orbSide">
      <div class="orb" id="orb"></div>
      <div class="speech" id="speech"></div>
      <div class="inputbar hidden" id="inputbar">
        <span class="prompt">&gt;</span>
        <input type="text" id="cmdInput" placeholder="Antworten Sie…  (z.B. Ja)" autocomplete="off" />
        <span class="hint">Enter</span>
      </div>
    </div>

    <!-- HUD-Seite (weitere Monitore) -->
    <div class="hud-panel hidden" id="hudSide">
      <div class="hud-title" id="hudTitle">J.A.R.V.I.S. // SYSTEM ONLINE</div>
      <div class="hud-rings">
        <div class="ring r1"></div>
        <div class="ring r2"></div>
        <div class="ring r3"></div>
        <div class="ring-core" id="hudCore">100%</div>
      </div>
      <div class="hud-lines" id="hudLines">
        <div><b>CORE</b> STABIL &nbsp;·&nbsp; <b>NET</b> AKTIV &nbsp;·&nbsp; <b>SEC</b> ARMIERT</div>
        <div>ALLE SUBSYSTEME EINSATZBEREIT</div>
      </div>
    </div>
  </div>

  <script>
    const params = new URLSearchParams(location.search);
    const role = params.get('role') || 'black';
    const mode = params.get('mode') || 'boot';
    const showInput = params.get('showInput') === '1';
    const initialText = params.get('text') || '';

    const orbSide = document.getElementById('orbSide');
    const hudSide = document.getElementById('hudSide');
    const orb = document.getElementById('orb');
    const speechEl = document.getElementById('speech');
    const inputbar = document.getElementById('inputbar');
    const cmdInput = document.getElementById('cmdInput');

    if (role === 'orb') orbSide.classList.remove('hidden');
    else if (role === 'hud') hudSide.classList.remove('hidden');
    // role 'black' zeigt nur Grid + Vignette.

    if (mode === 'lock' || mode === 'blackout') orb.classList.add('red');
    if (mode === 'red-alert') document.body.classList.add('red-alert');

    // Schreibmaschinen-Effekt für die Ansage.
    function typeText(text) {
      speechEl.classList.add('caret');
      let i = 0;
      (function step() {
        speechEl.textContent = text.slice(0, i);
        if (i < text.length) { i++; setTimeout(step, 32); }
        else {
          speechEl.classList.remove('caret');
          if (showInput) {
            inputbar.classList.remove('hidden');
            cmdInput.focus();
          }
        }
      })();
    }
    if (role === 'orb' && initialText) setTimeout(() => typeText(initialText), 500);

    if (showInput && role === 'orb') {
      cmdInput.addEventListener('keydown', (e) => {
        if (e.key === 'Enter' && window.projection) window.projection.dismiss(cmdInput.value.trim());
      });
    }

    // Main -> Projektion: Live-Updates (Text nachschieben, Farbe wechseln).
    if (window.projection && window.projection.onUpdate) {
      window.projection.onUpdate((payload) => {
        if (payload.text !== undefined && role === 'orb') typeText(payload.text);
        if (payload.red) { orb.classList.add('red'); document.body.classList.add('red-alert'); }
        if (payload.showInput && role === 'orb') { inputbar.classList.remove('hidden'); cmdInput.focus(); }
      });
    }
  </script>
</body>
</html>
