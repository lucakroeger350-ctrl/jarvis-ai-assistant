<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8" />
<style>
  html, body {
    margin: 0; padding: 0; width: 100%; height: 100%; background: transparent; overflow: hidden;
  }
  .dim {
    position: absolute; inset: 0; background: rgba(0,0,0,0);
    transition: background 0.6s ease;
  }
  .dim.active { background: rgba(0,0,0,0.55); }

  .orb-wrap {
    position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%) scale(0.7);
    opacity: 0; transition: opacity 0.5s ease, transform 0.5s ease;
  }
  .orb-wrap.active { opacity: 1; transform: translate(-50%,-50%) scale(1); }

  .orb {
    width: 140px; height: 140px; border-radius: 50%;
    background: radial-gradient(circle at 40% 35%, rgba(255,180,120,0.95), var(--c, #ff5722) 45%, rgba(0,0,0,0) 72%);
    box-shadow: 0 0 44px 14px rgba(255,87,34,0.35), 0 0 100px 40px rgba(255,87,34,0.12);
    animation: pulse 2s ease-in-out infinite;
  }
  @keyframes pulse {
    0%, 100% { transform: scale(0.94); opacity: 0.85; }
    50% { transform: scale(1.04); opacity: 1; }
  }
  .label {
    margin-top: 18px; text-align: center; font-family: 'Consolas', monospace; letter-spacing: 3px;
    font-size: 12px; color: #f4f0ec; opacity: 0.85;
  }
</style>
</head>
<body>
  <div class="dim" id="dim"></div>
  <div class="orb-wrap" id="orbWrap">
    <div class="orb" id="orb"></div>
    <div class="label" id="label">HÖRT ZU</div>
  </div>
  <script>
    const dimEl = document.getElementById('dim');
    const orbWrapEl = document.getElementById('orbWrap');
    const orbEl = document.getElementById('orb');
    const labelEl = document.getElementById('label');

    const COLORS = { listening: '#4dff9a', thinking: '#ff5722', speaking: '#ff3b30' };
    const LABELS = { listening: 'HÖRT ZU', thinking: 'DENKT NACH', speaking: 'ANTWORTET' };

    window.companionOverlay.onState((state) => {
      const active = state === 'listening' || state === 'thinking' || state === 'speaking';
      dimEl.classList.toggle('active', active);
      orbWrapEl.classList.toggle('active', active);
      if (active) {
        orbEl.style.setProperty('--c', COLORS[state] || '#ff5722');
        labelEl.textContent = LABELS[state] || '';
      }
    });
  </script>
</body>
</html>
